server.port=${PORT:8000}

# development | production
mozilcode.environment=${MOZILCODE_ENV:development}
mozilcode.web.allowed-origins=${MOZILCODE_ALLOWED_ORIGINS:http://localhost:1420,http://127.0.0.1:1420,http://localhost:8000,http://127.0.0.1:8000,http://localhost:5173,http://127.0.0.1:5173}

# JWT
mozilcode.jwt.secret=${MOZILCODE_JWT_SECRET:mozilcode-dev-secret-change-in-prod}

# Default: PostgreSQL. Create DB first: CREATE DATABASE mozilcode;
mozilcode.db.driver=${MOZILCODE_DB_DRIVER:org.postgresql.Driver}
mozilcode.db.url=${MOZILCODE_DB_URL:jdbc:postgresql://127.0.0.1:5432/mozilcode}
mozilcode.db.user=${MOZILCODE_DB_USER:postgres}
mozilcode.db.password=${MOZILCODE_DB_PASSWORD:postgres}